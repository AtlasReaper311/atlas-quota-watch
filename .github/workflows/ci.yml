name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quota-watch-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Verify Node runtime
        run: |
          node --version
          test "$(node -p 'Number(process.versions.node.split(".")[0]) >= 20')" = "true"

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker
        run: npm run validate
